name: Daily Video

on:
  schedule:
    - cron: "37 13 * * *"       # primary: 13:37 UTC (off the top-of-hour; GitHub heavily delays/skips :00 jobs)
    - cron: "17 16 * * *"       # backup: 16:17 UTC — runs only if the primary was delayed/skipped/failed (guard prevents a double)
  workflow_dispatch:             # manual run button (always runs)
    inputs:
      words:
        description: "Long-video narration word count (~175 words/min; 1400 ≈ 8 min)"
        default: "1400"
      target:
        description: "Which to build"
        type: choice
        options: [both, long, short]
        default: both
  repository_dispatch:           # external trigger (e.g. cron-job.org) via the GitHub API; always runs
    types: [build-video]

permissions:
  contents: write                # to commit state back

# Never run two daily batches at once.
concurrency:
  group: daily-video
  cancel-in-progress: false

jobs:
  # Decide once whether to skip (already made a video today), and ping Discord on start.
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip if a video was already made today
        id: guard
        run: |
          TODAY=$(date -u +%F)
          LAST=$(cat state/last-run.txt 2>/dev/null || echo none)
          if [ "$LAST" = "$TODAY" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Already made a video today ($TODAY) — skipping this scheduled run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Discord on start
        if: steps.guard.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "no webhook set"; exit 0; fi
          MSG="🟢 **Daily pipeline started** (${{ github.event_name }}). Building today's video + Short (real stock footage + kinetic captions).\\nLogs: $RUN_URL"
          curl -sf -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" "$DISCORD_WEBHOOK" || echo "discord notify failed"

  # Long video — its own runner + full timeout (so the Short can never starve it, and vice-versa).
  long:
    needs: guard
    if: needs.guard.outputs.skip != 'true' && (github.event.inputs.target == '' || github.event.inputs.target == 'both' || github.event.inputs.target == 'long')
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core
      - name: Install uv (free Edge-TTS narration)
        uses: astral-sh/setup-uv@v5
      - run: npm ci
      - name: Install Claude Code (script engine, uses your Max subscription)
        run: npm i -g @anthropic-ai/claude-code
      - name: Ensure Remotion browser (for the caption overlay render)
        run: npx remotion browser ensure
      - name: Build + upload long video
        env:
          SCRIPT_PROVIDER: "claude"
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # free fallback when Claude hits its usage limit
          VOICE_PROVIDER: "edge"
          EDGE_VOICE: "en-US-AndrewNeural"
          VIDEO_WORDS: ${{ github.event.inputs.words || '1400' }}  # ~8 min (two-pass script reliably hits length)
          VIDEO_SCENES: "12"
          BEAT_WORDS: "26"                                          # ~9s per clip -> ~50 clips for 8 min
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}             # free stock video (primary)
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}           # free stock video (fallback)
          PUBLISH_MODE: "auto"                                      # schedule PUBLIC ~2h after build
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: npx tsx src/scripts/make-daily.ts
      - name: Persist topic (race-safe; records long + short)
        if: success()
        run: npx tsx src/scripts/persist-topic.ts
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "no webhook set"; exit 0; fi
          MSG="🔴 **Long video FAILED** (${{ github.event_name }}). Check the logs: $RUN_URL"
          curl -sf -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" "$DISCORD_WEBHOOK" || echo "discord notify failed"

  # Short — separate runner, so it always renders even if the long video runs long.
  short:
    needs: guard
    if: needs.guard.outputs.skip != 'true' && (github.event.inputs.target == '' || github.event.inputs.target == 'both' || github.event.inputs.target == 'short')
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core
      - name: Install uv (free Edge-TTS narration)
        uses: astral-sh/setup-uv@v5
      - run: npm ci
      - name: Install Claude Code (script engine, uses your Max subscription)
        run: npm i -g @anthropic-ai/claude-code
      - name: Ensure Remotion browser (for the caption overlay render)
        run: npx remotion browser ensure
      - name: Build + upload Short
        env:
          SCRIPT_PROVIDER: "claude"
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # free fallback when Claude hits its usage limit
          VOICE_PROVIDER: "edge"
          EDGE_VOICE: "en-US-AndrewNeural"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PUBLISH_MODE: "auto"
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          npx tsx src/scripts/make-short-host.ts
          npx tsx src/scripts/publish-short.ts
      - name: Persist topic (race-safe; records long + short)
        if: success()
        run: npx tsx src/scripts/persist-topic.ts
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "no webhook set"; exit 0; fi
          MSG="🔴 **Short FAILED** (${{ github.event_name }}). Check the logs: $RUN_URL"
          curl -sf -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" "$DISCORD_WEBHOOK" || echo "discord notify failed"
