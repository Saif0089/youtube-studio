name: Daily Video

on:
  schedule:
    - cron: "37 13 * * *"       # primary: 13:37 UTC (off the top-of-hour; GitHub heavily delays/skips :00 jobs)
    - cron: "17 16 * * *"       # backup: 16:17 UTC — runs only if the primary was delayed/skipped/failed (guard prevents a double)
  workflow_dispatch:             # manual run button (always runs)
    inputs:
      words:
        description: "Long-video narration word count (~150 words/min; 1350 ≈ 9 min)"
        default: "1350"
  repository_dispatch:           # external trigger (e.g. cron-job.org) via the GitHub API; always runs
    types: [build-video]

permissions:
  contents: write                # to commit state back

# Never run two daily jobs at once. A second run (e.g. a scheduled one firing while a manual
# run is still going) waits, then the "already made a video today" guard skips it — no duplicates.
concurrency:
  group: daily-video
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      # Self-healing guard: skip a SCHEDULED run if a video was already made today.
      # Manual / repository_dispatch runs are never skipped. If the primary failed or was
      # skipped, the marker isn't updated, so the backup schedule retries automatically.
      - name: Skip if a video was already made today
        id: guard
        run: |
          TODAY=$(date -u +%F)
          LAST=$(cat state/last-run.txt 2>/dev/null || echo none)
          if [ "$LAST" = "$TODAY" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Already made a video today ($TODAY) — skipping this scheduled run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Discord on start
        if: steps.guard.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "no webhook set"; exit 0; fi
          MSG="🟢 **Daily doodle pipeline started** (${{ github.event_name }}). Building today's video + Short — this takes ~1 hour.\\nLogs: $RUN_URL"
          curl -sf -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" "$DISCORD_WEBHOOK" || echo "discord notify failed"
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: "20"
          cache: "npm"
      - name: Install ffmpeg + fonts
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core
      - name: Install uv (for free Edge-TTS narration)
        if: steps.guard.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5
      - name: Install deps
        if: steps.guard.outputs.skip != 'true'
        run: npm ci
      - name: Install Claude Code (script engine, uses your Max subscription)
        if: steps.guard.outputs.skip != 'true'
        run: npm i -g @anthropic-ai/claude-code
      - name: Ensure Remotion browser
        if: steps.guard.outputs.skip != 'true'
        run: npx remotion browser ensure
      - name: Build + upload daily video (stock backgrounds + doodle host)
        if: steps.guard.outputs.skip != 'true'
        env:
          SCRIPT_PROVIDER: "claude"       # Claude Code (your Max subscription) writes the script + draws the doodle host SVGs
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          VOICE_PROVIDER: "edge"          # free Edge-TTS
          EDGE_VOICE: "en-US-AndrewNeural"
          DOODLE_WORDS: ${{ github.event.inputs.words || '1350' }}  # ~9 min; per-sentence stock photos keep render lean
          DOODLE_SCENES: "16"             # pool of rigged doodle hosts (cycled per sentence for variety)
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}             # free stock photos (primary)
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}           # free stock photos (fallback)
          RENDER_CONCURRENCY: "2"         # free runner has ~2 cores
          PUBLISH_MODE: "approval"        # upload PRIVATE for review; set to "auto" to schedule public
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: npx tsx src/scripts/make-daily.ts
      - name: Build + upload Short (vertical, stock + doodle host)
        if: steps.guard.outputs.skip != 'true'
        env:
          SCRIPT_PROVIDER: "claude"
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          VOICE_PROVIDER: "edge"
          EDGE_VOICE: "en-US-AndrewNeural"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          RENDER_CONCURRENCY: "2"
          PUBLISH_MODE: "approval"
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          npx tsx src/scripts/make-short-host.ts
          npx tsx src/scripts/publish-short.ts
      - name: Persist state (used-topics + run marker)
        if: steps.guard.outputs.skip != 'true' && success()
        run: |
          date -u +%F > state/last-run.txt
          git config user.name "infotainmentstu-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/used-topics.json state/last-run.txt || true
          git commit -m "chore: update state [skip ci]" || echo "nothing to commit"
          git push || true
      # Ping Discord on ANY failure in this job (script gen, narration, render, upload, etc.)
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "no webhook set"; exit 0; fi
          MSG="🔴 **Daily video run FAILED** (${{ github.event_name }}). The video/short was not produced.\\nCheck the logs: $RUN_URL"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" \
            "$DISCORD_WEBHOOK" || echo "discord notify failed"
